version: '3.8'

services:
  web:
    # 현재 디렉토리(.)의 Dockerfile을 빌드
    build: .
    # 컨테이너 이름 지정
    container_name: fastapi_app
    # 호스트 포트 8000번과 컨테이너 포트 8000번 연결
    ports:
      - "8000:8000"
    # 소스 코드 변경 시 실시간 반영을 위한 볼륨 바인딩 (개발용)
    volumes:
      - .:/app
    # 컨테이너 다운 시 자동 재시작 설정
    restart: always